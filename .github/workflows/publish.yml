name: publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes

      - name: Build image
        run: nix build .#packages.x86_64-linux.default

      - name: Load image
        run: docker load -i result

      - name: Compute image tag
        run: echo "IMAGE_REF=ghcr.io/${{ github.repository_owner }}/opencode-nixos-web-image:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Tag image
        run: |
          IMAGE_ID=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -n 1)
          docker tag "$IMAGE_ID" "$IMAGE_REF"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push SHA tag
        if: github.event_name != 'pull_request'
        run: docker push "$IMAGE_REF"

      - name: Push latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE_REF" "ghcr.io/${{ github.repository_owner }}/opencode-nixos-web-image:latest"
          docker push "ghcr.io/${{ github.repository_owner }}/opencode-nixos-web-image:latest"

      - name: Push version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME}"
          docker tag "$IMAGE_REF" "ghcr.io/${{ github.repository_owner }}/opencode-nixos-web-image:${VERSION}"
          docker push "ghcr.io/${{ github.repository_owner }}/opencode-nixos-web-image:${VERSION}"
